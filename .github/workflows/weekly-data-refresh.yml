name: Weekly Data Refresh

# Regenerates the county dataset (src/js/data.js) from the live FCC BDC,
# Census ACS, and TIGERweb APIs once a week, and commits the result only if
# the underlying numbers actually changed.
#
# Scope note: this is the *mechanical* refresh. The county dataset is fully
# API-driven. The curated intel files (BEAD timelines, weekly brief, grants,
# competitors, etc.) are NOT refreshed here — they need judgment. This job
# emits ::warning:: annotations when those curated files look stale (see
# scripts/check-dates.js) so they can be updated separately.
#
# Requirements:
#   - Repository secret CENSUS_API_KEY (free: https://api.census.gov/data/key_signup.html)
#     The Census API blocks keyless requests from cloud IPs, so without this
#     the regeneration step will fail with a clear error.
#
# Activation note: GitHub only runs `schedule` triggers from the workflow file
# on the repository's DEFAULT branch. This will not run weekly until merged to
# the default (Pages) branch. Use "Run workflow" (workflow_dispatch) to test.

on:
  schedule:
    # 08:00 UTC every Monday
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate county dataset (FCC BDC + Census ACS + TIGERweb)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node scripts/build-data.js

      - name: Syntax-check generated data.js
        run: node -c src/js/data.js

      - name: Curated date-expiry report (advisory, non-fatal)
        run: node scripts/check-dates.js

      - name: Commit & push if county data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # The only volatile line in data.js is the "Generated by ... on <date>"
          # header. Ignore it when deciding whether anything meaningful changed,
          # so we don't commit a new dataset every week for an unchanged snapshot.
          if git diff --quiet -I'Generated by scripts/build-data.js' -- src/js/data.js; then
            echo "No county data changes — discarding date-only churn."
            git checkout -- src/js/data.js
          else
            echo "County data changed — committing."
            git add src/js/data.js
            git commit -m "chore(data): weekly automated refresh of county dataset"
            git push
          fi
